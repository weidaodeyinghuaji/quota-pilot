name: Bug report
description: Report a reproducible problem.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Codex Quota Glance.

        Do not paste API keys, access tokens, session files, SQLite databases, or request debug logs. Mask secrets as `sk-...abcd`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that reproduce the problem.
      placeholder: |
        1. Start the app
        2. Switch to API mode
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Windows version:
        App version:
        Codex mode: official login / API
        New API provider:
    validations:
      required: true
